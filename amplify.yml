version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -E 'WORLDLENS_|NEXT_PUBLIC_|SESSIONS_TABLE|NOVA_LITE' > .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
